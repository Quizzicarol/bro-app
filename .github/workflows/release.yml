name: Build & Publish APK Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version tag (leave empty to use pubspec.yaml)'
        required: false

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Generate env.json
        run: |
          printf '{"BREEZ_API_KEY":"%s","PLATFORM_LIGHTNING_ADDRESS":"%s","BACKEND_URL":"%s","ADMIN_PUBKEY":"%s","ADMIN_PASSWORD_HASH":"%s","BILLCODE_KEY":"%s"}' \
            "${{ secrets.BREEZ_API_KEY }}" \
            "${{ secrets.PLATFORM_LIGHTNING_ADDRESS }}" \
            "${{ secrets.BACKEND_URL }}" \
            "${{ secrets.ADMIN_PUBKEY }}" \
            "${{ secrets.ADMIN_PASSWORD_HASH }}" \
            "${{ secrets.BILLCODE_KEY }}" \
            > env.json

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Set up signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/bro-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=bro-release.jks
          EOF

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=env.json

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          TAG="${{ inputs.version_override }}"
          if [ -z "$TAG" ]; then
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        run: |
          APK_PATH=$(find build -name "*.apk" -path "*release*" | head -1)
          cp "$APK_PATH" "bro-${{ steps.version.outputs.tag }}.apk"
          gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Bro ${{ steps.version.outputs.tag }}" \
            --notes "## Bro ${{ steps.version.outputs.version }}

          📱 APK para instalação direta (Android).
          Compatível com Obtainium e GrapheneOS.

          ### Instalar via Obtainium
          Adicione este repositório no Obtainium para receber atualizações automáticas." \
            --latest \
            "bro-${{ steps.version.outputs.tag }}.apk"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
