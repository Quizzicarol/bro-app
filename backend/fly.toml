app = 'bro-api'
primary_region = 'gru'

[build]

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  ALLOWED_ORIGINS = 'https://brostr.app'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
